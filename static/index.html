<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 플로깅 분석 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    .spin { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div class="max-w-5xl mx-auto px-6 py-10">

    <!-- Header -->
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-green-400">AI 플로깅 분석 대시보드</h1>
      <p class="mt-2 text-gray-500 text-sm">YOLOv11 기반 쓰레기 감지 · 전남대학교 소프트웨어공학과 캡스톤</p>
    </div>

    <!-- Upload Card -->
    <div class="bg-gray-900 rounded-2xl p-6 mb-6 border border-gray-800">
      <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">이미지 업로드</h2>
      <label id="dropzone"
        class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-gray-700 rounded-xl cursor-pointer hover:border-green-500 hover:bg-gray-800/40 transition-all">
        <svg class="w-10 h-10 text-gray-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
        </svg>
        <p class="text-gray-400 text-sm">클릭하거나 파일을 드래그하세요</p>
        <p class="text-gray-600 text-xs mt-1">PNG · JPG · JPEG</p>
        <input id="fileInput" type="file" accept="image/*" class="hidden">
      </label>
      <p id="fileName" class="mt-3 text-sm text-gray-500 hidden"></p>
      <button id="analyzeBtn" disabled
        class="mt-4 w-full py-3 rounded-xl font-semibold text-sm bg-green-600 hover:bg-green-500 disabled:opacity-30 disabled:cursor-not-allowed transition-all">
        분석 시작
      </button>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden text-center py-12">
      <div class="spin inline-block w-10 h-10 border-4 border-green-500 border-t-transparent rounded-full"></div>
      <p class="mt-4 text-gray-400 text-sm">모델 추론 중...</p>
    </div>

    <!-- Error -->
    <div id="errorBox" class="hidden bg-red-950 border border-red-800 rounded-xl p-4 mb-6">
      <p class="text-red-400 text-sm font-medium">오류</p>
      <p id="errorMsg" class="text-red-300 text-sm mt-1"></p>
    </div>

    <!-- Results -->
    <div id="results" class="hidden space-y-6">

      <!-- Stat Cards -->
      <div id="statsBar" class="grid grid-cols-3 gap-4"></div>

      <!-- Image Comparison -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-gray-900 rounded-2xl p-4 border border-gray-800">
          <p class="text-xs text-gray-500 uppercase tracking-wider mb-3">원본 이미지</p>
          <img id="originalImg" class="w-full rounded-lg object-contain max-h-72 bg-gray-950">
        </div>
        <div class="bg-gray-900 rounded-2xl p-4 border border-gray-800">
          <p class="text-xs text-gray-500 uppercase tracking-wider mb-3">감지 결과 (YOLO 박스)</p>
          <img id="annotatedImg" class="w-full rounded-lg object-contain max-h-72 bg-gray-950">
        </div>
      </div>

      <!-- Counts + JSON -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-gray-900 rounded-2xl p-5 border border-gray-800">
          <p class="text-xs text-gray-500 uppercase tracking-wider mb-4">종류별 감지 수</p>
          <div id="countsList" class="space-y-2"></div>
        </div>
        <div class="bg-gray-900 rounded-2xl p-5 border border-gray-800 flex flex-col">
          <p class="text-xs text-gray-500 uppercase tracking-wider mb-3">응답 JSON</p>
          <pre id="jsonOutput"
            class="text-xs text-green-300 overflow-auto flex-1 bg-gray-950 rounded-lg p-3 leading-5 max-h-64"></pre>
        </div>
      </div>

    </div>
  </div>

  <script>
    const fileInput  = document.getElementById('fileInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const fileNameEl = document.getElementById('fileName');
    const loading    = document.getElementById('loading');
    const results    = document.getElementById('results');
    const errorBox   = document.getElementById('errorBox');

    let selectedFile = null;
    const dropzone = document.getElementById('dropzone');

    // 드래그 오버 시 브라우저 기본 동작(새 탭 열기) 차단
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
      dropzone.addEventListener(ev, e => e.preventDefault());
      document.body.addEventListener(ev, e => e.preventDefault());
    });

    dropzone.addEventListener('dragover', () => dropzone.classList.add('border-green-500', 'bg-gray-800/40'));
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('border-green-500', 'bg-gray-800/40'));

    dropzone.addEventListener('drop', (e) => {
      dropzone.classList.remove('border-green-500', 'bg-gray-800/40');
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) setFile(file);
    });

    function setFile(file) {
      selectedFile = file;
      fileNameEl.textContent = `선택됨: ${file.name}`;
      fileNameEl.classList.remove('hidden');
      analyzeBtn.disabled = false;
      document.getElementById('originalImg').src = URL.createObjectURL(file);
    }

    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      setLoading(true);
      results.classList.add('hidden');
      errorBox.classList.add('hidden');

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res = await fetch('/predict/visualize', { method: 'POST', body: formData });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: `HTTP ${res.status}` }));
          throw new Error(err.detail || '서버 오류');
        }
        const data = await res.json();
        renderResults(data);
      } catch (err) {
        document.getElementById('errorMsg').textContent = err.message;
        errorBox.classList.remove('hidden');
      } finally {
        setLoading(false);
      }
    });

    function setLoading(on) {
      loading.classList.toggle('hidden', !on);
      analyzeBtn.disabled = on;
    }

    function renderResults(data) {
      // Stat cards
      document.getElementById('statsBar').innerHTML = [
        { label: '총 감지 객체',  value: data.total_count,                           color: 'text-green-400' },
        { label: '쓰레기 종류',   value: Object.keys(data.counts).length + '종',     color: 'text-blue-400'  },
        { label: '추론 시간',     value: data.inference_speed_ms + ' ms',            color: 'text-yellow-400'},
      ].map(s => `
        <div class="bg-gray-900 rounded-xl p-4 border border-gray-800 text-center">
          <p class="text-2xl font-bold ${s.color}">${s.value}</p>
          <p class="text-xs text-gray-500 mt-1">${s.label}</p>
        </div>
      `).join('');

      // Annotated image
      document.getElementById('annotatedImg').src =
        `data:image/jpeg;base64,${data.annotated_image_base64}`;

      // Counts list
      const countsList = document.getElementById('countsList');
      const entries = Object.entries(data.counts).sort((a, b) => b[1] - a[1]);
      countsList.innerHTML = entries.length
        ? entries.map(([name, count]) => `
            <div class="flex justify-between items-center py-1.5 border-b border-gray-800 last:border-0">
              <span class="text-gray-300 text-sm">${name}</span>
              <span class="bg-green-900/60 text-green-300 text-xs font-bold px-3 py-0.5 rounded-full">${count}개</span>
            </div>
          `).join('')
        : '<p class="text-gray-600 text-sm">감지된 객체가 없습니다.</p>';

      // JSON preview (base64 생략)
      const preview = { ...data, annotated_image_base64: `[base64 ${Math.round(data.annotated_image_base64.length / 1024)} KB 생략]` };
      document.getElementById('jsonOutput').textContent = JSON.stringify(preview, null, 2);

      results.classList.remove('hidden');
      results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  </script>
</body>
</html>
